<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Trivia Quiz</title>
    <link rel="stylesheet" href="fruit-quiz-style.css">
</head>
<body>
    <div class="container">
        <div class="quiz-box">
            <div class="quiz-header">
                <h1>� Game for Goblu 🎉</h1>
                <p class="subtitle">Learn Fruits! 🍎🍌🍊</p>
                <div class="score-info">
                    <span>Question: <span id="questionNumber">1</span>/8</span>
                    <span>Score: <span id="score">0</span></span>
                </div>
            </div>
            
            <div id="quizContent" class="quiz-content">
                <div id="questionBox" class="question-box">
                    <div class="fruit-display">
                        <div id="fruitEmoji" class="fruit-emoji">🍎</div>
                        <button id="audioBtn" class="audio-btn" onclick="speakFruitName()">🔊 Say the Name!</button>
                    </div>
                    <h2 id="question">Which fruit is this?</h2>
                    <div id="optionsBox" class="options-box"></div>
                </div>
            </div>
            
            <div id="resultBox" class="result-box" style="display: none;">
                <h2>🎊 You Did It! 🎊</h2>
                <p id="finalScore"></p>
                <button onclick="restartQuiz()" class="btn-restart">🔄 Play Again!</button>
            </div>
            
            <div class="button-group">
                <button id="nextBtn" onclick="nextQuestion()" class="btn-next" style="display: none;">Next Question</button>
            </div>
        </div>
    </div>
    <script src="fruit-quiz.js"></script>
</body>
</html>
